# Legal Move Generation Rules — Cascading filters + ban lists
#
# PIPELINE: Rules are evaluated highest-priority first. The first rule
# whose "condition" returns true AND whose "action" (filter) returns
# a non-empty card list halts the pipeline — that list IS the legal moves.
#
# BAN LIST: After the pipeline produces legal moves, ban rules are applied
# sequentially (highest priority first). A ban rule whose condition is true
# filters OUT cards from the result.

rules:
  # === LEADING (no cards on the table yet) ===

  - name: LeadAnything
    priority: 200
    condition: is_leading
    action: play_anything
    params:
      description: "When leading the trick, any card in hand is playable."

  # === OVERPLAY variants (Klop / Berac) — must beat the best card ===

  - name: FollowSuitOverplay
    priority: 150
    condition: has_lead_suit_and_overplay
    action: follow_suit_overplay
    params:
      description: >
        In Klop/Berac: must follow suit AND play a higher card if possible.
        Falls back to any card of that suit if no higher card exists.

  - name: FollowTarokOverplay
    priority: 140
    condition: lead_is_tarok_and_overplay
    action: follow_tarok_overplay
    params:
      description: >
        In Klop/Berac: tarok led, must play a higher tarok if possible.

  - name: TrumpInOverplay
    priority: 130
    condition: cant_follow_suit_has_taroks_overplay
    action: trump_in_overplay
    params:
      description: >
        In Klop/Berac: can't follow suit, must trump in with a tarok
        higher than the current best tarok on the table if possible.

  # === STANDARD (non-overplay) ===

  - name: MustFollowSuit
    priority: 90
    condition: has_lead_suit
    action: follow_suit
    params:
      description: "Must follow the led suit when holding cards of that suit."

  - name: MustFollowTarok
    priority: 80
    condition: lead_is_tarok
    action: follow_tarok
    params:
      description: "Tarok was led — must play a tarok if you have one."

  - name: MustTrumpIn
    priority: 70
    condition: cant_follow_suit_has_taroks
    action: trump_in
    params:
      description: "Cannot follow suit — must play a tarok if you have one."

  # === FALLBACK ===

  - name: PlayAnything
    priority: 0
    condition: always
    action: play_anything
    params:
      description: >
        Cannot follow suit and has no taroks — may play any card in hand.

# Ban rules — applied AFTER the pipeline, in priority order.
ban_rules:
  - name: BanPagatInOverplay
    priority: 100
    condition: pagat_exposed_in_overplay
    filter: ban_pagat_if_other_taroks
    params:
      description: >
        In Klop/Berac the Pagat cannot be voluntarily played if there
        are other taroks in hand. It must be forced out as the last tarok.
