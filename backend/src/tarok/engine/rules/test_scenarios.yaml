# BDD Test Scenarios for the Rules Engine
#
# Schema: each scenario defines:
#   name:      Human-readable test name
#   engine:    "legal_moves" | "trick_eval"
#   given:     Setup context
#   expected:  Assertions on the Trace output
#
# Card shorthand:
#   Taroks:  "T1" (Pagat) .. "T21" (Mond), "T22" (Škis)
#   Suits:   "<Rank><Suit>" where Rank=1-4,J,C,Q,K  Suit=H,D,C,S
#            e.g. "KH" = King of Hearts, "1D" = Pip1 of Diamonds,
#                 "JS" = Jack of Spades
#
# Contract shorthand: three, two, one, solo_three, solo_two, solo_one, solo, klop, berac

# ===================================================================
# LEGAL MOVE SCENARIOS
# ===================================================================

legal_moves:

  # --- FOLLOW SUIT ---

  - name: "Must follow suit when holding lead suit"
    given:
      hand: ["KH", "1H", "KC", "1C"]
      lead_card: "QH"
      contract: three
    expected:
      cards: ["KH", "1H"]
      triggered_rule: MustFollowSuit

  - name: "Must play tarok when cannot follow suit"
    given:
      hand: ["KC", "1C", "T5", "T10"]
      lead_card: "QH"
      contract: three
    expected:
      cards: ["T5", "T10"]
      triggered_rule: MustTrumpIn

  - name: "Play anything when no suit match and no taroks"
    given:
      hand: ["KC", "1D"]
      lead_card: "QH"
      contract: three
    expected:
      cards: ["KC", "1D"]
      triggered_rule: PlayAnything

  - name: "Must follow tarok with tarok"
    given:
      hand: ["T3", "T8", "KH", "1C"]
      lead_card: "T15"
      contract: three
    expected:
      cards: ["T3", "T8"]
      triggered_rule: MustFollowTarok

  - name: "Leading — can play anything"
    given:
      hand: ["T3", "KH", "1C", "QD"]
      lead_card: null
      contract: three
    expected:
      cards: ["T3", "KH", "1C", "QD"]
      triggered_rule: LeadAnything

  # --- OVERPLAY (Klop/Berac) ---

  - name: "Klop — follow suit must overplay if possible"
    given:
      hand: ["KH", "1H", "KC"]
      lead_card: "QH"
      best_card: "QH"
      contract: klop
    expected:
      cards: ["KH"]
      triggered_rule: FollowSuitOverplay

  - name: "Klop — follow suit falls back to any same-suit if cannot beat"
    given:
      hand: ["1H", "2H", "KC"]
      lead_card: "KH"
      best_card: "KH"
      contract: klop
    expected:
      cards: ["1H", "2H"]
      triggered_rule: FollowSuitOverplay

  - name: "Klop — follow tarok must overplay"
    given:
      hand: ["T18", "T3", "KH"]
      lead_card: "T15"
      best_card: "T15"
      contract: klop
    expected:
      cards: ["T18"]
      triggered_rule: FollowTarokOverplay

  - name: "Klop — trump in must overplay"
    given:
      hand: ["KC", "T18", "T3"]
      lead_card: "QH"
      best_card: "T10"
      contract: klop
    expected:
      cards: ["T18"]
      triggered_rule: TrumpInOverplay

  - name: "Berac — Pagat banned when other taroks exist"
    given:
      hand: ["T1", "T5", "T10"]
      lead_card: "T15"
      best_card: "T15"
      contract: berac
    expected:
      # T1 banned, but T5 and T10 don't beat T15 either, so pipeline
      # returns [T5, T10, T1] from FollowTarokOverplay fallback,
      # then ban removes T1 → [T5, T10]
      cards: ["T5", "T10"]
      triggered_rule: FollowTarokOverplay
      applied_bans: ["BanPagatInOverplay"]

  - name: "Berac — Pagat is only tarok, must play it"
    given:
      hand: ["T1", "KC", "QD"]
      lead_card: "T15"
      best_card: "T15"
      contract: berac
    expected:
      cards: ["T1"]
      triggered_rule: FollowTarokOverplay

  # --- PAGAT FORCED OUT WHEN MOND+ŠKIS IN TRICK ---

  - name: "Klop — Pagat forced out when Mond and Škis in trick"
    given:
      hand: ["T1", "T5", "T10"]
      lead_card: "T21"
      best_card: "T22"
      contract: klop
      trick_cards: ["T21", "T22"]
    expected:
      cards: ["T1"]
      triggered_rule: FollowTarokOverplay
      applied_bans: ["ForcePagatWhenMondSkisInTrick"]

  - name: "Berac — Pagat forced when Mond+Škis on table, even with other taroks"
    given:
      hand: ["T1", "T18", "T3"]
      lead_card: "T22"
      best_card: "T22"
      contract: berac
      trick_cards: ["T22", "T21"]
    expected:
      cards: ["T1"]
      triggered_rule: FollowTarokOverplay
      applied_bans: ["ForcePagatWhenMondSkisInTrick"]

  - name: "Klop — Pagat still banned when only Mond (no Škis) in trick"
    given:
      hand: ["T1", "T5", "T10"]
      lead_card: "T21"
      best_card: "T21"
      contract: klop
      trick_cards: ["T21"]
    expected:
      cards: ["T5", "T10"]
      triggered_rule: FollowTarokOverplay
      applied_bans: ["BanPagatInOverplay"]

# ===================================================================
# TRICK EVALUATION SCENARIOS
# ===================================================================

trick_eval:

  - name: "Higher tarok beats lower tarok"
    given:
      cards:
        - [0, "T10"]
        - [1, "T15"]
        - [2, "T5"]
        - [3, "T3"]
    expected:
      winner: 1
      triggered_rule: StandardTrickWinner

  - name: "Any tarok beats suit card"
    given:
      cards:
        - [0, "KH"]
        - [1, "T1"]
        - [2, "1H"]
        - [3, "2H"]
    expected:
      winner: 1
      triggered_rule: StandardTrickWinner

  - name: "Lead suit wins over off-suit"
    given:
      cards:
        - [0, "KH"]
        - [1, "KC"]
        - [2, "1H"]
        - [3, "2H"]
    expected:
      winner: 0
      triggered_rule: StandardTrickWinner

  - name: "Highest of lead suit wins when no taroks"
    given:
      cards:
        - [0, "1H"]
        - [1, "QH"]
        - [2, "KH"]
        - [3, "JH"]
    expected:
      winner: 2
      triggered_rule: StandardTrickWinner

  - name: "Škis captured in last trick"
    given:
      cards:
        - [0, "T22"]
        - [1, "T20"]
        - [2, "T5"]
        - [3, "T3"]
      is_last_trick: true
    expected:
      winner: 0  # Škis still wins (value 22 beats all taroks in beats())
      triggered_rule: SkisCapturedLastTrick

  # --- PAGAT-MOND-ŠKIS TRULA TRICK RULE ---

  - name: "Pagat wins when all 3 trula cards in same trick"
    given:
      cards:
        - [0, "T21"]   # Mond
        - [1, "T22"]   # Škis
        - [2, "T1"]    # Pagat
        - [3, "T15"]
    expected:
      winner: 2
      triggered_rule: PagatWinsTrulaTrick

  - name: "Pagat wins trula trick even when played first"
    given:
      cards:
        - [0, "T1"]    # Pagat
        - [1, "T21"]   # Mond
        - [2, "T22"]   # Škis
        - [3, "T10"]
    expected:
      winner: 0
      triggered_rule: PagatWinsTrulaTrick

  - name: "Standard trick when only 2 trula cards present"
    given:
      cards:
        - [0, "T1"]    # Pagat
        - [1, "T21"]   # Mond
        - [2, "T15"]
        - [3, "T10"]
    expected:
      winner: 1   # Mond (21) beats all
      triggered_rule: StandardTrickWinner

  # --- BARVNI VALAT TRICK RULE ---

  - name: "Barvni valat — suit card beats tarok"
    given:
      cards:
        - [0, "T20"]
        - [1, "KH"]
        - [2, "T15"]
        - [3, "1H"]
      contract: barvni_valat
    expected:
      winner: 1  # King of Hearts beats taroks
      triggered_rule: BarvniValatWinner

  - name: "Barvni valat — lead suit wins over off-suit"
    given:
      cards:
        - [0, "KH"]
        - [1, "KC"]
        - [2, "QH"]
        - [3, "T20"]
      contract: barvni_valat
    expected:
      winner: 0  # King of Hearts is lead suit and highest
      triggered_rule: BarvniValatWinner

  - name: "Barvni valat — all taroks, standard tarok resolution"
    given:
      cards:
        - [0, "T5"]
        - [1, "T20"]
        - [2, "T10"]
        - [3, "T3"]
      contract: barvni_valat
    expected:
      winner: 1  # T20 highest tarok
      triggered_rule: BarvniValatWinner
