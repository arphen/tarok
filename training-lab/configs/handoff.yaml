# ---------------------------------------------------------
# STAGE 2: The Handoff (Bridge to Self-Play)
# Goal: Fade out BC, ramp up PPO, and begin Latent Distillation
# ---------------------------------------------------------

bench_seats: "nn,bot_v1,bot_v3,bot_m6"
iterations: 50
games: 2500
outplace_session_size: 50
bench_games: 3000
benchmark_checkpoints: [0, 20, 40, 60, 80, 100]
best_model_metric: "elo"

# --- Core RL math ---
gamma: 0.995
gae_lambda: 0.98
clip_epsilon: 0.2
policy_coef: 1.0           # RESTORED: Let the agent's own rewards drive learning
value_coef: 0.5
explore_rate: 0.05         # GENTLE: Allow some exploration, but don't go wild yet

# --- Optimization Setup ---
ppo_epochs: 4
batch_size: 16384

# --- Schedules (The Heart of the Handoff) ---
lr: 0.0002                 # Start slightly lower than warm-up for stability
lr_schedule: elo           # Let learning rate slow down as the agent peaks
lr_min: 0.00001

# --- Entropy ---
entropy_coef: 0.003
entropy_schedule: linear
entropy_coef_min: 0.001

# --- Behavioral Cloning (Fading Out) ---
behavioral_clone_coef: 0.50 # DROPPED: Reduced from 1.5, now a "suggestion"
behavioral_clone_schedule: linear
behavioral_clone_coef_min: 0.0
behavioral_clone_teacher: bot_v5
behavioral_clone_games_per_iteration: 10000

# --- Oracle Latent Distillation (Ramping In) ---
# Now that the agent knows how to play, teach it "why" using the Oracle Coach.
imitation_coef: 0.10
imitation_schedule: constant
imitation_coef_min: 0.10

# --- Runner Hardware ---
concurrency: 256
lapajne_mc_worlds: 24   # Optional: worlds per Lapajne card decision (1..512)
lapajne_mc_sims: 20   # Optional: sims per Lapajne MCTS tree (1..4096)
device: auto
iteration_runner_mode: spawn
iteration_runner_restart_every: 10

# --- The Classroom (League) ---
league:
  enabled: true
  min_nn_per_game: 2       # Start playing against other NNs (Self-Play)
  sampling: matchmaking    # Match against opponents of similar skill
  snapshot_interval: 10    # Start saving checkpoints to the pool
  elo_outplace_unit_weight: 5

  opponents:
    - name: StockSkis
      type: bot_v1
      initial_elo: 800
    - name: V3_Intermediate
      type: bot_v3
      initial_elo: 1300
