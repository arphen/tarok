# EC2 g5.2xlarge — 1-hour self-play sprint
#
# Tuned for NVIDIA A10G (24 GB VRAM, CUDA).
# Expect ~250-350 games/sec vs ~50-66 on MacBook Pro M3 (MPS).
#
# At ~300 games/sec:  40 iterations × 20 000 games ≈ 800 000 games ≈ 45-55 min
# Add ~5-10 min for benchmark rounds and PPO epochs → fits in 1 hour comfortably.
#
# Usage:
#   make train-iterate CONFIG=ec2-g5-1h MODEL=checkpoints/your_model.pt

seats: "nn,nn,nn,nn"
bench_seats: "nn,bot_v1,bot_v3,bot_m6"

iterations: 40
games: 20000
bench_games: 5000
benchmark_checkpoints: [0, 10, 20, 30, 39]
best_model_metric: "loss"

ppo_epochs: 6
batch_size: 16384        # A10G 24 GB VRAM handles 2× the Mac limit comfortably
lr: 0.0003
imitation_coef: 0.30
imitation_schedule: linear
imitation_coef_min: 0.00
explore_rate: 0.10

concurrency: 256         # double the Mac default; CUDA handles larger queues well
device: cuda
memory_telemetry: true
memory_telemetry_every: 5

league:
  enabled: true
  min_nn_per_game: 2
  sampling: pfsp
  pfsp_alpha: 0.1
  snapshot_interval: 10

  opponents:
    - name: StockSkisV1
      type: bot_v1
    - name: StockSkisM6
      type: bot_m6
    - name: StockSkisV5
      type: bot_v5
