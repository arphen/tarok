# ---------------------------------------------------------
# Duplicate Reinforcement Learning (DRL) — actor-only mode
# See docs/double_rl.md §2.7.
#
# What this config does:
#   Same duplicate pod setup as duplicate.yaml (paired learner vs shadow on
#   identical deals), but enables actor-only PPO mode.
#
# Actor-only implications:
#   - duplicate.actor_only: true
#   - model_arch: v5 (critic/oracle-pruned network variant)
#   - PPO runs without value/oracle losses; terminal duplicate advantage is
#     broadcast through trajectories.
#
# Usage:
#   make train-new CONFIG=duplicate-actor-only
#   make train-new CONFIG=duplicate-actor-only EXTRA="--iterations 30"
# ---------------------------------------------------------

seats: "nn,bot_v5,bot_v5,bot_v5"   # ignored during duplicate pods; pairing picks seatings
bench_seats: "nn,bot_v1,bot_v3,bot_m6"

iterations: 50
# 100 pods x 8 games/pod = 800 games/iter
# (duplicate uses pods_per_iteration below).
games: 800
outplace_session_size: 50
bench_games: 2000
benchmark_checkpoints: [0, 5, 10, 20, 30, 40, 50]
best_model_metric: "elo"

# Actor-only uses duplicate terminal-advantage broadcast instead of GAE/value loss.
# Keep gamma for the trajectory-wise discounting in that broadcast.
gamma: 0.995
gae_lambda: 0.98
clip_epsilon: 0.2
value_coef: 0.5
entropy_coef: 0.003
explore_rate: 0.05

ppo_epochs: 4
batch_size: 8192

lr: 0.0002
lr_schedule: elo
lr_min: 0.00001

entropy_schedule: linear
entropy_coef_min: 0.0005

imitation_coef: 0.0

# Critical for actor-only pruning path (TarokNetV5).
model_arch: v5
oracle_critic: false

concurrency: 64
device: auto
iteration_runner_mode: inprocess

league:
  enabled: true
  min_nn_per_game: 1
  sampling: matchmaking
  snapshot_interval: 5
  snapshot_elo_delta: 50
  max_active_snapshots: 3
  elo_outplace_unit_weight: 5
  initial_calibration_enabled: true
  initial_calibration_games_per_pair: 2000
  initial_calibration_anchor: V3
  initial_calibration_anchor_elo: 1500

  opponents:
    - name: V3
      type: bot_v3
    - name: V5
      type: bot_v5
    - name: M6
      type: bot_m6
    - name: Lustrek
      type: bot_lustrek

duplicate:
  enabled: true
  actor_only: true
  pairing: rotation_8game
  pods_per_iteration: 200
  shadow_source: previous_iteration
  apply_shaped_bonuses: false
  reward_model: shadow_score_diff
  rng_seed: 0
