# Train against 3 rule-based bots (default — recommended starting point)
#
# Your neural network sits at seat 0 and learns from games against
# three StockŠkis v5 opponents.  This is the safest way to train
# because the opponents provide a stable difficulty baseline.
#
# Usage:
#   make train CONFIG=vs-3-bots MODEL=backend/checkpoints/tarok_agent_latest.pt

seats: "nn,bot_v5,bot_v5,bot_v5"
bench_seats: "nn,bot_v5,bot_v5,bot_v5"   # benchmark uses same layout

iterations: 10
games: 10000          # self-play games per iteration
bench_games: 10000    # benchmark games per evaluation

# PPO hyper-parameters
ppo_epochs: 6
batch_size: 8192
lr: 0.0003
explore_rate: 0.10

concurrency: 128
device: auto
