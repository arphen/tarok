# ---------------------------------------------------------
# BOOTSTRAP PHASE: Behavioral Cloning
# Goal: copy V5 behavior with action-level cloning while keeping PPO value learning healthy
# ---------------------------------------------------------

bench_seats: "nn,bot_v1,bot_v3,bot_m6"

iterations: 50             # Capped at 50; you'll likely stop it early via Ctrl+C
games: 500
outplace_session_size: 50  # compare cumulative scores per 50-game session for Elo outplacing
bench_games: 3000
benchmark_checkpoints: [0, 10, 20, 30, 40, 50]
best_model_metric: "elo"

# --- Core PPO Settings ---
gamma: 0.995
gae_lambda: 0.98
clip_epsilon: 0.2
policy_coef: 0
value_coef: 0.5
explore_rate: 0

# --- Optimization Setup ---
ppo_epochs: 4
batch_size: 16384

# --- Learning Rate (Linear for Bootstrap) ---
# We disable Elo-based LR during bootstrap to keep optimization predictable.
lr: 0.0003
lr_schedule: linear
lr_min: 0.00001

# --- Entropy ---
# Low entropy during BC warm-up: we want memorization, not exploration.
# BC loss already drives entropy down; 0.001 prevents dead logits without fighting the clone signal.
entropy_coef: 0.001
entropy_schedule: constant
entropy_coef_min: 0.001

# --- Oracle Latent Distillation (disabled in warm-up) ---
# This controls privileged-oracle feature matching, not behavior cloning.
imitation_coef: 0.00
imitation_schedule: constant

# --- Behavioral Cloning (action-level warm-up) ---
# This is true BC: cross-entropy on expert actions from V5 games.
behavioral_clone_coef: 1.50
behavioral_clone_teacher: bot_v5
behavioral_clone_games_per_iteration: 20000

# --- Runner Hardware ---
concurrency: 256
lapajne_mc_worlds: 24   # Optional: worlds per Lapajne card decision (1..512)
lapajne_mc_sims: 20   # Optional: sims per Lapajne MCTS tree (1..4096)
device: auto
iteration_runner_mode: spawn
iteration_runner_restart_every: 10

# --- The Classroom (League) ---
league:
  enabled: true
  min_nn_per_game: 1        # learner seat 0 + three sampled opponents
  sampling: uniform         # single-opponent pool during bootstrap
  snapshot_interval: 9999   # Disabled: Do not fill the pool with clone checkpoints
  elo_outplace_unit_weight: 5

  opponents:
    - name: StockSkis_Classroom
      type: bot_v1
      initial_elo: 800